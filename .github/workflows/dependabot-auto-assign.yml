name: Auto-assign Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to process (leave empty to process all open Dependabot PRs)"
        required: false
        type: string

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'pull_request' && startsWith(github.head_ref, 'dependabot'))
    steps:
      - name: Auto-assign PR to @millerm30
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const assignee = 'millerm30';

            // Handle manual dispatch
            if (context.eventName === 'workflow_dispatch') {
              const prNumber = context.payload.inputs.pr_number;
              
              if (prNumber) {
                // Process specific PR
                const pr = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber
                });
                
                if (!pr.data.head.ref.startsWith('dependabot')) {
                  console.log(`PR #${prNumber} is not a Dependabot PR, skipping...`);
                  return;
                }
                
                // Auto-assign the specific PR
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: prNumber,
                  assignees: [assignee]
                });

                // Request review from @millerm30
                await github.rest.pulls.requestReviewers({
                  owner,
                  repo,
                  pull_number: prNumber,
                  reviewers: [assignee]
                });

                console.log(`Auto-assigned Dependabot PR #${prNumber} to @${assignee}`);
              } else {
                // Process all open Dependabot PRs
                const { data: prs } = await github.rest.pulls.list({
                  owner,
                  repo,
                  state: 'open'
                });
                
                const dependabotPRs = prs.filter(pr => pr.head.ref.startsWith('dependabot'));
                
                for (const pr of dependabotPRs) {
                  // Auto-assign the PR
                  await github.rest.issues.addAssignees({
                    owner,
                    repo,
                    issue_number: pr.number,
                    assignees: [assignee]
                  });

                  // Request review from @millerm30
                  await github.rest.pulls.requestReviewers({
                    owner,
                    repo,
                    pull_number: pr.number,
                    reviewers: [assignee]
                  });

                  console.log(`Auto-assigned Dependabot PR #${pr.number} to @${assignee}`);
                }
                
                console.log(`Processed ${dependabotPRs.length} Dependabot PRs`);
              }
            } else {
              // Handle automatic trigger (pull_request event)
              // Auto-assign the PR to @millerm30
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: context.issue.number,
                assignees: [assignee]
              });

              // Request review from @millerm30
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number: context.issue.number,
                reviewers: [assignee]
              });

              console.log(`Auto-assigned Dependabot PR #${context.issue.number} to @${assignee}`);
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
